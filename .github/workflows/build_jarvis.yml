name: Build Jarvis AI

on:
  push:
    paths:
      - "jarvis_client/**"
      - "jarvis_android/**"
      - ".github/workflows/**"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: "Build Windows EXE"
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r jarvis_client/requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --uac-admin --icon=jarvis_client/icon.ico --add-data "jarvis_client/icon.png;." --name JarvisAI jarvis_client/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAI-Windows
          path: dist/JarvisAI.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "jarvis-v1.${{ github.run_number }}"
          name: "Jarvis AI v1.${{ github.run_number }}"
          body: |
            🤖 **Jarvis AI — PUBG Voice Assistant**
            Avtomatik build #${{ github.run_number }}

            **O'rnatish:**
            1. `JarvisAI.exe` ni yuklab oling.
            2. Ishga tushiring. Ekranning yuqorisida "J" logosi paydo bo'ladi.
            3. **"Hey Jarvis"** deb chaqiring va buyruq bering!

            **Buyruqlar:** ot och, bosib tur, toxta, reload, crouch, heal, map
          files: dist/JarvisAI.exe

  build-android-apk:
    name: "Build Android APK"
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            lld ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          cd jarvis_android
          yes | buildozer android debug 2>&1 | tail -n 5000

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAI-Android
          path: jarvis_android/bin/*.apk

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "jarvis-v1.${{ github.run_number }}"
          files: jarvis_android/bin/*.apk
