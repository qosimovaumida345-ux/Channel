name: Build Jarvis AI

on:
  push:
    paths:
      - "jarvis_client/**"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: "Build Windows EXE"
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r jarvis_client/requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name JarvisAI jarvis_client/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAI-Windows
          path: dist/JarvisAI.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "jarvis-v1.${{ github.run_number }}"
          name: "Jarvis AI v1.${{ github.run_number }}"
          body: |
            🤖 **Jarvis AI — PUBG Voice Assistant**
            Avtomatik build #${{ github.run_number }}

            **O'rnatish:**
            1. `JarvisAI.exe` ni yuklab oling.
            2. Ishga tushiring. Ekranning yuqorisida "J" logosi paydo bo'ladi.
            3. **"Hey Jarvis"** deb chaqiring va buyruq bering!

            **Buyruqlar:** ot och, bosib tur, toxta, reload, crouch, heal, map
          files: dist/JarvisAI.exe

  build-android-apk:
    name: "Build Android APK (Proto)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          cd jarvis_android
          buildozer android debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAI-Android
          path: jarvis_android/bin/*.apk

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "jarvis-v1.${{ github.run_number }}"
          files: jarvis_android/bin/*.apk
